name: Build & Publish

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            cibw_archs: x86_64
          # Linux aarch64
          - os: linux
            arch: aarch64
            runner: ubuntu-24.04-arm
            cibw_archs: aarch64
          # macOS arm64
          - os: macos
            arch: arm64
            runner: macos-14
            cibw_archs: arm64
          # Windows x86_64
          - os: windows
            arch: x86_64
            runner: windows-latest
            cibw_archs: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: .vcpkg_cache
          key: vcpkg-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ matrix.os }}-${{ matrix.arch }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28

          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *_i686 *-win32"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

          CIBW_BEFORE_ALL_LINUX: >
            yum install -y curl zip unzip tar pkgconfig perl-IPC-Cmd gcc gcc-c++ &&
            pip install cmake ninja &&
            export VCPKG_FORCE_SYSTEM_BINARIES=1 &&
            ( [ -d /opt/vcpkg ] || git clone https://github.com/microsoft/vcpkg.git /opt/vcpkg ) &&
            /opt/vcpkg/bootstrap-vcpkg.sh -disableMetrics &&
            cd {project} &&
            mkdir -p .vcpkg_cache &&
            /opt/vcpkg/vcpkg install

          CIBW_ENVIRONMENT_LINUX: >
            VCPKG_FORCE_SYSTEM_BINARIES=1
            VCPKG_BINARY_SOURCES="clear;files,{project}/.vcpkg_cache,readwrite"
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_INSTALLED_DIR={project}/vcpkg_installed -DVCPKG_BUILD_TYPE=release"

          CIBW_BEFORE_ALL_MACOS: >
            cd {project} &&
            mkdir -p .vcpkg_cache &&
            $VCPKG_INSTALLATION_ROOT/vcpkg install

          CIBW_ENVIRONMENT_MACOS: >
            VCPKG_BINARY_SOURCES="clear;files,{project}/.vcpkg_cache,readwrite"
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_INSTALLED_DIR={project}/vcpkg_installed -DVCPKG_BUILD_TYPE=release"

          CIBW_BEFORE_ALL_WINDOWS: >
            cd /d {project} &&
            if not exist .vcpkg_cache mkdir .vcpkg_cache &&
            C:/vcpkg/vcpkg.exe install --triplet x64-windows-static-md

          CIBW_ENVIRONMENT_WINDOWS: >
            VCPKG_BINARY_SOURCES="clear;files,{project}/.vcpkg_cache,readwrite"
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_INSTALLED_DIR={project}/vcpkg_installed -DVCPKG_BUILD_TYPE=release -DVCPKG_TARGET_TRIPLET=x64-windows-static-md"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  upload_release:
    name: Upload to GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish_test_pypi:
      name: Publish to TestPyPI
      needs: [build_wheels, build_sdist]
      runs-on: ubuntu-latest
      permissions:
        id-token: write
      if: github.event_name == 'workflow_dispatch'
      steps:
        - uses: actions/download-artifact@v4
          with:
            path: dist
            merge-multiple: true

        - name: Publish to TestPyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            repository-url: https://test.pypi.org/legacy/
            skip-existing: true

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1