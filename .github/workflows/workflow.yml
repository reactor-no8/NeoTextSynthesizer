name: Build & Publish

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            cibw_archs: x86_64
          # Linux aarch64
          - os: linux
            arch: aarch64
            runner: ubuntu-24.04-arm
            cibw_archs: aarch64
          # macOS arm64
          - os: macos
            arch: arm64
            runner: macos-14
            cibw_archs: arm64
          # Windows x86_64
          - os: windows
            arch: x86_64
            runner: windows-latest
            cibw_archs: AMD64
            vcpkg_triplet: x64-windows-static-md
          # Windows arm64
          - os: windows
            arch: arm64
            runner: windows-11-arm
            cibw_archs: ARM64
            vcpkg_triplet: arm64-windows-static-md

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Fix workspace path for Windows
        if: runner.os == 'Windows'
        run: |
          $fixed_path = "${{ github.workspace }}".Replace('\', '/')
          echo "VCPKG_CACHE_PATH=$fixed_path/.vcpkg_cache" >> $env:GITHUB_ENV
          echo "VCPKG_INSTALLED_DIR=$fixed_path/vcpkg_installed" >> $env:GITHUB_ENV

      - name: Cache vcpkg binaries
        uses: actions/cache@v5.0.4
        with:
          path: .vcpkg_cache
          key: vcpkg-os_${{ matrix.os }}-arch_${{ matrix.arch }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-os_${{ matrix.os }}-arch_${{ matrix.arch }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28

          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_* *_i686 *-win32"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}

          CIBW_BEFORE_ALL_LINUX: >
            yum install -y curl zip unzip tar pkgconfig perl-IPC-Cmd gcc gcc-c++ &&
            pip install cmake ninja &&
            export VCPKG_FORCE_SYSTEM_BINARIES=1 &&
            ( [ -d /opt/vcpkg ] || git clone https://github.com/microsoft/vcpkg.git /opt/vcpkg ) &&
            /opt/vcpkg/bootstrap-vcpkg.sh -disableMetrics &&
            cd {project} &&
            mkdir -p /host${{ github.workspace }}/.vcpkg_cache &&
            /opt/vcpkg/vcpkg install

          CIBW_ENVIRONMENT_LINUX: >
            VCPKG_FORCE_SYSTEM_BINARIES=1
            VCPKG_BINARY_SOURCES="clear;files,/host${{ github.workspace }}/.vcpkg_cache,readwrite"
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_INSTALLED_DIR=/project/vcpkg_installed -DVCPKG_BUILD_TYPE=release"

          CIBW_BEFORE_ALL_MACOS: >
            cd {project} &&
            mkdir -p ${{ github.workspace }}/.vcpkg_cache &&
            $VCPKG_INSTALLATION_ROOT/vcpkg install

          CIBW_ENVIRONMENT_MACOS: >
            VCPKG_BINARY_SOURCES="clear;files,${{ github.workspace }}/.vcpkg_cache,readwrite"
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_INSTALLED_DIR=${{ github.workspace }}/vcpkg_installed -DVCPKG_BUILD_TYPE=release"

          CIBW_BEFORE_ALL_WINDOWS: >
            if not exist "${{ env.VCPKG_CACHE_PATH }}" mkdir "${{ env.VCPKG_CACHE_PATH }}" &&
            C:/vcpkg/vcpkg.exe install --triplet ${{ matrix.vcpkg_triplet }}

          CIBW_ENVIRONMENT_WINDOWS: >
            VCPKG_BINARY_SOURCES="clear;files,${{ env.VCPKG_CACHE_PATH }},readwrite"
            CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake 
                        -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} 
                        -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }} 
                        -DVCPKG_BUILD_TYPE=release"

      - name: Fix cache permissions on Linux
        if: runner.os == 'Linux'
        run: sudo chown -R $USER:$USER .vcpkg_cache

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz

  upload_release:
    name: Upload to GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: dist/*

  publish_test_pypi:
      name: Publish to TestPyPI
      needs: [build_wheels, build_sdist]
      runs-on: ubuntu-latest
      permissions:
        id-token: write
      if: github.event_name == 'workflow_dispatch'
      steps:
        - uses: actions/download-artifact@v8.0.1
          with:
            path: dist
            merge-multiple: true

        - name: Publish to TestPyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            repository-url: https://test.pypi.org/legacy/
            skip-existing: true

  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1