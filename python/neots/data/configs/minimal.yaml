text_sampler:
  min_targets: 5
  max_targets: 50
  font_size: 55
  vertical_prob: 0.2
  sample_strategy: "auto-fallback"
  font_list:
    - "./fonts"

random_config:
  - type: random
    prob: 1.0
    from_string: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789,.-"

bg_sampler:
  bg_image_prob: 0.0
  gray_bg_prob: 0.7
  text_color: "auto"
  bg_color: "auto"
  bg_list:
    - "./backgrounds"

post_process:
  text_effects:
    effect_prob: 0.2
    partial_effect_prob: 0.8
  text_paste:
    scale_range: [0.7, 1.1]
    margin_range: [-5, 20]
    offset_prob: 0.5
    h_offset_range: [-7, 7]
    v_offset_range: [-5, 5]
  transforms:
    rotation_prob: 0.3
    rotation_range: [-2.5, 2.5]
    distortion_prob: 0.2
    distortion_level: 0.03

generate:
  output_height: 48
  retry_on_error: true
  out_jsonl: ./generated.jsonl
  out_dir: ./generated
  batchsize: 1000
  hierarchical_structure: [100, 625]